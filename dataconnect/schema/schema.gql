# Isla Konek Data Connect Schema
# Defines the relational structure for the maritime management system.

type Port @table {
  id: String! @primaryKey
  name: String!
  location: String!
}

type Ship @table {
  id: String! @primaryKey
  name: String!
  capacity: Int!
  status: String!
  vesselType: String!
}

type Route @table {
  id: String! @primaryKey
  name: String!
  departurePort: Port!
  destinationPort: Port!
  distance: Float!
}

type Schedule @table {
  id: String! @primaryKey
  route: Route!
  ship: Ship
  departureTime: String!
  arrivalTime: String!
  tripType: String! # 'Daily' or 'Special'
  date: String # Required for Special trips
  availableSeats: Int!
  status: String @default(value: "On Time")
}

type Passenger @table {
  id: String! @primaryKey
  firstName: String!
  lastName: String!
  email: String! @unique
  phone: String
}

type Booking @table {
  id: String! @primaryKey
  passenger: Passenger!
  schedule: Schedule!
  travelDate: Date!
  totalPrice: Float!
  status: String!
  paymentStatus: String @default(value: "Unpaid")
}
