
# Isla Konek Relational Schema
# Defines the structure for maritime operations, routes, and bookings.

# Ports of operation
type Port @table {
  id: String! @primaryKey
  name: String!
  location: String!
}

# Vessels in the fleet
type Ship @table {
  id: String! @primaryKey
  name: String!
  capacity: Int!
  status: String! # In Service, Under Maintenance, etc.
  vesselType: String! # Ferry, High-Speed Craft, etc.
}

# Navigation routes between ports
type Route @table {
  id: String! @primaryKey
  name: String!
  departure: String!
  destination: String!
}

# Pricing for specific routes
type Fare @table {
  id: String! @primaryKey
  route: Route!
  price: Float!
  passengerType: String! # Adult, Child, Senior, etc.
}

# Trip instances or recurring templates
type Schedule @table {
  id: String! @primaryKey
  tripType: String! # Daily, Special
  ship: Ship
  route: Route!
  date: Date # Null for recurring daily templates
  departureTime: String!
  availableSeats: Int!
}

# Passenger travel records
type Booking @table {
  id: String! @primaryKey
  passengerId: String!
  schedule: Schedule!
  travelDate: Date!
  totalPrice: Float!
  status: String! # Reserved, Confirmed, Completed, Cancelled
  departurePortName: String
}

# Public service announcements
type Announcement @table {
  id: String! @primaryKey
  title: String!
  content: String!
  category: String! # Weather Update, Route Change, etc.
  createdAt: Timestamp! @default(expr: "request.time")
}
