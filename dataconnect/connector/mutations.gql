
# Standard Data Mutation Operations

# Record a new seat reservation
mutation CreateBooking(
  $id: String!,
  $passengerId: String!,
  $scheduleId: String!,
  $travelDate: Date!,
  $totalPrice: Float!,
  $status: String!,
  $departurePortName: String
) @auth(level: USER) {
  booking_insert(data: {
    id: $id,
    passengerId: $passengerId,
    scheduleId: $scheduleId,
    travelDate: $travelDate,
    totalPrice: $totalPrice,
    status: $status,
    departurePortName: $departurePortName
  })
}

# Post a service advisory (Admin only)
mutation PostAdvisory(
  $id: String!,
  $title: String!,
  $content: String!,
  $category: String!
) @auth(level: USER) {
  announcement_insert(data: {
    id: $id,
    title: $title,
    content: $content,
    category: $category
  })
}
