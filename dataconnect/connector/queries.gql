
# Queries for Isla Konek Maritime System

# Get all active announcements
query ListAnnouncements @auth(level: PUBLIC) {
  announcements(orderBy: [{createdAt: DESC}]) {
    id
    title
    content
    category
    createdAt
  }
}

# Get available schedules for a specific route and date
query GetSchedules($routeId: UUID!, $date: Date!) @auth(level: PUBLIC) {
  schedules(where: {
    route: {id: {eq: $routeId}},
    date: {eq: $date}
  }) {
    id
    departureTime
    availableSeats
    status
    ship {
      name
    }
  }
}

# Get passenger profile
query GetPassengerProfile($id: String!) @auth(level: USER_ID) {
  passenger(id: $id) {
    firstName
    lastName
    email
    phone
  }
}

# Get staff data for dashboard
query GetStaffData($id: String!) @auth(level: USER_ID) {
  staff(id: $id) {
    name
    roles
    assignedPort {
      name
    }
    assignedShip {
      name
    }
  }
}

# List all bookings for a passenger
query ListMyBookings($passengerId: String!) @auth(level: USER_ID) {
  bookings(where: {passenger: {id: {eq: $passengerId}}}, orderBy: [{createdAt: DESC}]) {
    id
    travelDate
    totalPrice
    status
    paymentStatus
    schedule {
      departureTime
      route {
        name
      }
    }
  }
}
