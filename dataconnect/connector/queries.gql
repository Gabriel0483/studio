
# Standard Data Fetching Operations

# Get all routes for public selection
query ListRoutes @auth(level: PUBLIC) {
  routes {
    id
    name
    departure
    destination
  }
}

# Find available trips for a route
query GetAvailableSchedules($routeId: String!, $date: Date) @auth(level: PUBLIC) {
  schedules(where: {
    routeId: { eq: $routeId },
    date: { eq: $date }
  }) {
    id
    departureTime
    availableSeats
    ship {
      name
      vesselType
    }
  }
}

# View current traveler bookings
query GetMyBookings($passengerId: String!) @auth(level: USER) {
  bookings(where: { passengerId: { eq: $passengerId } }) {
    id
    travelDate
    totalPrice
    status
    schedule {
      route {
        name
      }
      departureTime
    }
  }
}
